<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./icons/react.png" type="image/png" />
    <title>React Projects</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap"
      rel="stylesheet" />

    <style>
      * {
        font-family: "Inter", sans-serif;
      }

      body {
        background: radial-gradient(
          circle at top left,
          #c2d7ae 0,
          #a7efdf 30%,
          #d9e396 60%,
          #8fc6e8 100%
        );
      }
    </style>
  </head>

  <body class="text-gray-800">
    <!-- Header -->
    <header
      class="sticky top-0 backdrop-blur-xl bg-white/70 border-b border-slate-200 z-50">
      <div
        class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4">
        <h1
          class="text-xl font-extrabold bg-gradient-to-r from-sky-500 via-blue-700 to-indigo-700 bg-clip-text text-transparent">
          React Projects
        </h1>

        <div class="flex gap-6 font-semibold text-sm">
          <a
            href="https://github.com/alamtaufeeq854"
            target="_blank"
            class="hover:text-blue-600 transition">
            GitHub
          </a>

          <a
            href="https://www.linkedin.com/in/alamtaufeeq854/"
            target="_blank"
            class="hover:text-sky-600 transition">
            LinkedIn
          </a>
        </div>
      </div>
    </header>

    <!-- Hero -->

    <section class="max-w-6xl mx-auto px-6 py-20 text-center">
      <div
        class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-blue-100 text-blue-700 text-lg font-semibold mb-6">
        <img src="./icons/react.png" class="w-10 h-10 object-contain" /> Built
        with React
      </div>

      <h2
        class="text-5xl md:text-6xl font-extrabold bg-gradient-to-r from-sky-500 via-blue-600 to-indigo-600 bg-clip-text text-transparent">
        React Projects
      </h2>
    </section>

    <!-- Projects -->

    <section class="max-w-7xl mx-auto px-6 pb-20">
      <div id="grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </section>

    <!-- Footer -->

    <footer
      class="py-8 border-t border-slate-200 text-center text-gray-600 font-medium">
      Building modern React applications.
    </footer>

    <script>
      const projects = [
        {
          id: "01",
          name: "BMI Calculator",
          desc: "Calculate your Body Mass Index (BMI) based on height and weight.",
          icon: "./icons/bmi.png",
          live: "https://bmi-calculator-theta-weld.vercel.app/",
          code: "https://github.com/alamtaufeeq854/react-projects/tree/main/01.bmi_calculator",
          color: "from-purple-500 to-blue-600",
        },

        {
          id: "02",
          name: "Todo App",
          desc: "Organize and manage daily tasks with a clean and responsive interface.",
          icon: "./icons/todo.png",
          live: "https://todo-app-alpha-ecru-57.vercel.app/",
          code: "https://github.com/alamtaufeeq854/react-projects/tree/main/02.todo_app",
          color: "from-emerald-500 to-teal-600",
        },

        {
          id: "03",
          name: "Login & Signup UI",
          desc: "A responsive authentication interface with Login and Sign Up forms.",
          icon: "./icons/login.png",
          live: "https://login-signup-page-gules.vercel.app/",
          code: "https://github.com/alamtaufeeq854/react-projects/tree/main/03.login_signup",
          color: "from-pink-500 to-rose-600",
        },

        {
          id: "04",
          name: "Landing Page",
          desc: "A modern React landing page with an animated hero section, image slider, and video background.",
          icon: "./icons/landing-page.png",
          live: "https://landing-pages-rho-two.vercel.app/",
          code: "https://github.com/alamtaufeeq854/react-projects/tree/main/04.landing_page",
          color: "from-orange-500 to-red-600",
        },

        {
          id: "05",
          name: "Tic Tac Toe",
          desc: "A classic two-player Tic Tac Toe game with win detection, draw handling, and reset functionality.",
          icon: "./icons/tic-tac-toe.png",
          live: "https://tic-tac-toe-game-seven-black.vercel.app/",
          code: "https://github.com/alamtaufeeq854/react-projects/tree/main/05.tic_tac_toe_game",
          color: "from-cyan-500 to-blue-600",
        },

        {
          id: "06",
          name: "Quiz App",
          desc: "An interactive quiz application with score tracking, answer validation, and restart functionality.",
          icon: "./icons/quiz.png",
          live: "https://quiz-app-nine-pi-51.vercel.app/",
          code: "https://github.com/alamtaufeeq854/react-projects/tree/main/06.quiz_app",
          color: "from-yellow-500 to-orange-600",
        },

        {
          id: "07",
          name: "News App",
          desc: "A React news application that fetches and displays the latest headlines using API.",
          icon: "./icons/news.png",
          live: "https://news-app-tau-ten.vercel.app/",
          code: "https://github.com/alamtaufeeq854/react-projects/tree/main/07.news_app",
          color: "from-red-500 to-orange-600",
        },

        {
          id: "08",
          name: "AI Image Generator",
          desc: "Generate AI-powered images from text prompts using the Pollinations API.",
          icon: "./icons/image.png",
          live: "https://image-generator-five-beige.vercel.app/",
          code: "https://github.com/alamtaufeeq854/react-projects/tree/main/08.image_generator",
          color: "from-fuchsia-500 to-purple-600",
        },
      ];

      const grid = document.getElementById("grid");

      projects.forEach((project) => {
        const card = document.createElement("div");

        card.className =
          "group bg-yellow-50 backdrop-blur rounded-3xl p-6 border border-slate-200 shadow-sm hover:shadow-xl transition duration-300 hover:-translate-y-2";

        card.innerHTML = `

        <span
        class="inline-block px-3 py-1 rounded-full bg-slate-100 text-xs font-bold mb-5">

        Project ${project.id}

        </span>

        <div class="flex items-center gap-3">

        <div class="w-14 h-14 flex items-center justify-center">
         <img
         src="${project.icon}"
         class="w-12 h-12 object-contain"
             />
        </div>

          <h4
          class="text-xl font-bold bg-gradient-to-r ${project.color} bg-clip-text text-transparent">

          ${project.name}

          </h4>

        </div>

        <p class="mt-4 text-gray-600 leading-7 font-bold">

        ${project.desc}

        </p>

        <div class="flex gap-3 mt-8">

        <a
        href="${project.live}"
        target="_blank"
        class="flex-1 text-center py-3 rounded-xl text-white font-bold bg-gradient-to-r ${project.color}">

        Live Demo

        </a>

        <a
        href="${project.code}"
        target="_blank"
        class="flex-1 text-center py-3 rounded-xl border border-slate-600 font-semibold hover:bg-slate-100 transition">

        Source Code

        </a>

        </div>

        `;

        grid.appendChild(card);
      });
    </script>
  </body>
</html>
